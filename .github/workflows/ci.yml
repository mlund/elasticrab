name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.features || 'default' }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "--features sparse", "--features parallel", "--features cli"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        # `-D warnings` gates on the stable clippy lints (+ rustc warnings); the
        # nursery group is unstable across toolchains, so it stays a manual check.
      - run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

  test:
    name: test (${{ matrix.os }}, ${{ matrix.features || 'default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            features: ""
          - os: ubuntu-latest
            features: "--features sparse"
          - os: ubuntu-latest
            features: "--features parallel"
          - os: ubuntu-latest
            features: "--features cli"
          - os: windows-latest
            features: "--features cli"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test ${{ matrix.features }}

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --features sparse
